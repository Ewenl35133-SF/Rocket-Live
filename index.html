<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Relais de Signal</title>
    <!-- On utilise une version de HLS.js hébergée sur un CDN neutre -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; text-align: center; }
        #screen { width: 90%; max-width: 800px; aspect-ratio: 16/9; margin: 20px auto; background: #111; border: 1px solid #00ff00; }
        input { width: 60%; padding: 10px; background: #000; border: 1px solid #00ff00; color: #00ff00; }
        button { padding: 10px 20px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h1>📟 LIAISON SATELLITE CHIFFRÉE</h1>
    <p>Le flux est extrait via tunnel tiers pour contourner le blocage Chrome.</p>
    
    <input type="text" id="ytUrl" placeholder="Coller le lien du live ici...">
    <button onclick="startTunnel()">DÉCRYPTER</button>

    <div id="screen">
        <video id="videoPlayer" controls autoplay></video>
    </div>

    <script>
        function startTunnel() {
            var url = document.getElementById('ytUrl').value;
            var id = "";
            if(url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            else id = url.split('/').pop();

            // On utilise un proxy HLS qui ne mentionne JAMAIS youtube
            // Ce serveur (Piped) télécharge pour toi et te renvoie les segments
            var proxyStream = "https://piped-api.lunar.icu/manifest/hls/" + id + ".m3u8";

            var video = document.getElementById('videoPlayer');
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(proxyStream);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxyStream;
            }
        }
    </script>
</body>
</html>
