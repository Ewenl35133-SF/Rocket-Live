<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Moniteur de Lancement</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #ui { padding: 10px; background: #111; border-bottom: 1px solid #333; }
        input { width: 60%; padding: 8px; background: #000; border: 1px solid #444; color: #fff; }
        button { padding: 8px 20px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; }
        #player-container { width: 100vw; height: calc(100vh - 60px); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="ui">
        <input type="text" id="url" placeholder="Lien YouTube ici...">
        <button onclick="play()">VOIR LE DIRECT</button>
    </div>
    <div id="player-container">
        <div style="padding-top:15vh; color:#444;">Signal en attente de liaison...</div>
    </div>

    <script>
        function play() {
            var val = document.getElementById('url').value;
            var id = "";
            
            // Nettoyage intelligent du lien
            if(val.includes('v=')) { id = val.split('v=')[1].split('&')[0]; }
            else if(val.includes('youtu.be/')) { id = val.split('/').pop().split('?')[0]; }
            else { id = val; }

            if(id.length === 11) {
                // On utilise l'URL d'intégration la plus neutre possible
                document.getElementById('player-container').innerHTML = 
                    '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&modestbranding=1&rel=0" allow="autoplay; fullscreen"></iframe>';
            }
        }
    </script>
</body>
</html>
