<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>My Space Launch Center</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>

body { background: #000; color: white; font-family: sans-serif; text-
align: center; }

#video-container { width: 80%; margin: auto; background: #111; }
video { width: 100%; border: 2px solid #444; }
.launch-list { margin-top: 20px; display: flex; flex-direction: column;
align-items: center; }

.mission-card { background: #222; padding: 15px; margin: 10px; border-
radius: 8px; width: 60%; }

</style>
</head>
<body>
<h1>Direct Spatial</h1>
<div id="video-container">
<video id="video" controls autoplay></video>
</div>
<div class="launch-list" id="launches">
<!-- Les données de l'API s'afficheront ici -->
</div>
<script>
// 1. Gestion du flux Vidéo
var video = document.getElementById('video');
var videoSrc = 'https://ntvpublic.akamaized.net/hls/live/2023153/ntv-

public/master.m3u8'; // NASA TV Public
if (Hls.isSupported()) {
var hls = new Hls();
hls.loadSource(videoSrc);
hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
video.src = videoSrc;
}
// 2. Récupération des données (API)
fetch('https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5')
.then(response => response.json())
.then(data => {
const container = document.getElementById('launches');
data.results.forEach(launch => {
const card = document.createElement('div');
card.className = 'mission-card';
card.innerHTML = `<h3>${launch.name}</h3><p>Date : ${new
Date(launch.net).toLocaleString()}</p>`;
container.appendChild(card);
});
});
</script>
</body>
</html>
