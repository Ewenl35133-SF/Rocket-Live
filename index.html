<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Space Stream - Mode Direct</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        input { width: 70%; padding: 12px; border: 1px solid #333; background: #111; color: #fff; border-radius: 5px; }
        button { padding: 12px 25px; background: #e63946; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #player-area { margin-top: 20px; width: 100%; aspect-ratio: 16 / 9; background: #050505; border: 1px solid #222; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .info { color: #555; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Space Launch Monitor</h1>
        <input type="text" id="ytUrl" placeholder="Colle le lien YouTube ici...">
        <button onclick="launchStream()">LANCER</button>
        
        <div id="player-area">
            <div style="padding-top: 20%; color: #333;">Signal en attente...</div>
        </div>
        
        <p class="info">Utilise le domaine sécurisé youtube-nocookie pour éviter les blocages.</p>
    </div>

    <script>
        function launchStream() {
            var url = document.getElementById('ytUrl').value;
            var videoId = "";
            
            // Extraction rapide de l'ID
            if (url.includes('v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('/').pop();
            } else {
                videoId = url; // Si l'utilisateur met juste l'ID
            }

            if (videoId.length === 11) {
                var area = document.getElementById('player-area');
                // On injecte l'iframe avec des paramètres qui cachent le maximum de trucs YouTube
                area.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
            } else {
                alert("ID YouTube invalide !");
            }
        }
    </script>
</body>
</html>
