<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Station Relais Spatiale</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0b0d17; color: #4cc9f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 1px solid #4cc9f0; padding: 20px; max-width: 900px; margin: auto; background: #000; box-shadow: 0 0 15px #4cc9f0; }
        input { width: 70%; padding: 10px; background: #111; border: 1px solid #4cc9f0; color: #fff; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #4cc9f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #video-container { margin-top: 20px; background: #000; aspect-ratio: 16/9; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .status { font-size: 0.8em; margin-top: 10px; color: #777; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📡 RELAY STATION ALPHA</h1>
        <input type="text" id="target" placeholder="Entrez le code source du signal...">
        <button onclick="connect()">ÉTABLIR LA LIAISON</button>
        <div id="video-container">
            <video id="remoteVideo" controls autoplay></video>
        </div>
        <p class="status">Statut : En attente d'encodage HLS propriétaire.</p>
    </div>

    <script>
        function connect() {
            var raw = document.getElementById('target').value;
            // Extraction de l'ID si c'est une URL complète
            var id = raw.includes('v=') ? raw.split('v=')[1].split('&')[0] : (raw.includes('be/') ? raw.split('be/')[1] : raw);
            
            // PASSERELLE DE CAMOUFLAGE
            // On utilise un proxy de flux qui ne contient pas le mot "YouTube" dans l'URL
            var streamUrl = "https://inv.n8pjl.ca/api/v1/manifest/hls/" + id + ".m3u8";

            var video = document.getElementById('remoteVideo');
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }
        }
    </script>
</body>
</html>
