<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Spatiale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .monitor { width: 90%; max-width: 900px; margin: 20px auto; border: 2px solid #333; background: #050505; }
        .btn-group { margin: 10px; }
        button { padding: 10px; background: #222; color: #eee; border: 1px solid #444; cursor: pointer; margin: 5px; }
        button:hover { background: #444; }
        video { width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>LIAISON DIRECTE (SANS YOUTUBE)</h1>
    <div class="monitor">
        <video id="video" controls autoplay></video>
        <div class="btn-group">
            <button onclick="loadStream('https://ntvpublic.akamaized.net/hls/live/2023153/ntv-public/master.m3u8')">FLUX NASA (DIRECT AKAMAI)</button>
            <button onclick="loadStream('https://nasatv-uhd.akamaized.net/hls/live/2023155/uhd-prod/master.m3u8')">NASA 4K (DIRECT AKAMAI)</button>
        </div>
    </div>
    <p style="color: #666; font-size: 0.8em;">Note : Ces flux utilisent les serveurs de diffusion brute, sans interface Google.</p>

    <script>
        var video = document.getElementById('video');
        var hls = new Hls();

        function loadStream(url) {
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }
        // Charger la NASA par défaut
        loadStream('https://ntvpublic.akamaized.net/hls/live/2023153/ntv-public/master.m3u8');
    </script>
</body>
</html>
